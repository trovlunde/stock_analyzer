version: '3.8'

services:
  stock-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - FLASK_DEBUG=False
      - FLASK_PORT=5000
      - FLASK_HOST=0.0.0.0
      - DATABASE_URL=sqlite:////app/data/stock_analysis.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
